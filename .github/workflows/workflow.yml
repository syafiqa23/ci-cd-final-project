name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    # 🔥 WAJIB ADA (INI YANG KURANG)
    - name: Install dependencies
      run: npm ci

    - name: Fix permissions
      run: chmod +x ./node_modules/.bin/eslint

    # 🔍 LINT
    - name: Run ESLint
      run: npx --no-install eslint .

    # 🧪 TEST
    - name: Run Jest Test
      run: npm test